name: Deploy on main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 12m
          envs: APP_DIR
          script: |
            set -euo pipefail
            test -n "$APP_DIR"
            cd "$APP_DIR"
            ./scripts/deploy_from_git.sh
